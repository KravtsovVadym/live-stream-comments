# --- PostgreSQL database service
services:
  db:
    image: postgres:17
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  # --- Redis broker for Celery
  redis:
    image: redis:7
    restart: always
    ports:
      - "6379:6379"
      
volumes:
  postgres_data:
